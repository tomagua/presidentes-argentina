<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presidentes de la República Argentina</title>

  <!-- Bootstrap 5 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Header -->
  <header class="site-header text-center py-5">
    <div class="container">
      <div class="flag-stripe mb-3">
        <span class="stripe blue"></span>
        <span class="stripe white">
          <span class="sol">☀</span>
        </span>
        <span class="stripe blue"></span>
      </div>
      <h1 class="display-title">Presidentes de la República Argentina</h1>
      <p class="subtitle">Historia y datos de cada mandato</p>
    </div>
  </header>

  <!-- Main content -->
  <main class="container py-4" id="app">

    <!-- Loader -->
    <div id="loader" class="text-center py-5">
      <div class="spinner-border text-primary" role="status" style="width:3rem;height:3rem;">
        <span class="visually-hidden">Cargando...</span>
      </div>
      <p class="mt-3 loader-text">Cargando presidentes…</p>
    </div>

    <!-- Error message (hidden by default) -->
    <div id="error-msg" class="alert alert-danger d-none" role="alert">
      No se pudo obtener la información. Intentá de nuevo más tarde.
    </div>

    <!-- Cards container -->
    <div id="cards-container" class="row row-cols-1 row-cols-md-3 g-4 d-none"></div>

  </main>

  <footer class="text-center py-4 mt-4 site-footer">
    <p class="mb-0">Fuente: <a href="https://argentinadatos.com" target="_blank">ArgentinaDatos.com</a></p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
